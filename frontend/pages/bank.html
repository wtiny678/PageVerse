<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bank Details — PageVerse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins,system-ui;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
}
header{
  padding:16px;
  text-align:center;
  background:rgba(255,255,255,0.05);
  font-size:22px;
  font-weight:700;
  color:#38bdf8;
}
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}
.card{
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}
h3{
  margin-top:0;
  color:#38bdf8;
}
input,select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:8px;
  background:#020617;
  color:white;
}
label{
  display:block;
  margin-top:12px;
  font-size:14px;
  color:#cbd5f5;
}
button{
  margin-top:16px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:black;
  font-weight:700;
  cursor:pointer;
}
button:hover{
  background:#0ea5e9;
}
.bank-display{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  font-size:14px;
}
.badge{
  padding:6px 12px;
  background:#16a34a;
  border-radius:20px;
  font-size:12px;
  display:inline-block;
}
.withdraw-box{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
.withdraw-box input{
  flex:1;
}
footer{
  text-align:center;
  padding:10px;
  font-size:13px;
  color:#94a3b8;
}
.floating-back{
position:fixed;
top:18px;
left:18px;
padding:10px 16px;
border-radius:12px;
background:rgba(56,189,248,.15);
backdrop-filter:blur(10px);
color:#38bdf8;
font-weight:700;
text-decoration:none;
border:1px solid rgba(56,189,248,.5);
z-index:9999;
transition:.3s;
}

.floating-back:hover{
background:#38bdf8;
color:black;
box-shadow:0 0 25px rgba(56,189,248,.9);
}
</style>
</head>

<body>

<header>🏦 Bank & Withdrawal</header>
<a href="dashboard.html" class="floating-back">⬅ Dashboard</a>
<!-- BANK DETAILS FORM -->
<div class="card">
  <h3>➕ Add / Update Bank Details</h3>

  <label>Account Holder Name</label>
  <input type="text" id="holder_name" placeholder="John Doe">

  <label>Bank Name</label>
  <input type="text" id="bank_name" placeholder="State Bank of India">

  <label>Account Number</label>
  <input 
    type="tel"
    inputmode="numeric"
    pattern="[0-9]*"
    id="account_number"
    placeholder="1234567890"
  >

  <label>IFSC Code</label>
  <input 
    type="text"
    id="ifsc"
    placeholder="SBIN0001234"
    style="text-transform:uppercase"
  >

  <button type="button" onclick="saveBank()">
    Save Bank Details
  </button>
</div>


<!-- DISPLAY BANK DETAILS -->
<div class="card">
  <h3>📄 Your Bank Details</h3>
  <div id="bankInfo" class="bank-display">
    <p><b>Status:</b> <span class="badge">Not Added</span></p>
  </div>
</div>


<!-- WITHDRAW MONEY -->
<div class="card">
  <h3>💰 Withdraw Earnings</h3>

  <div class="withdraw-box">
    <input
      type="number"
      id="withdraw_amount"
      placeholder="Enter amount"
      min="1"
      step="1"
    >

    <button type="button" onclick="withdrawMoney()">
      Withdraw
    </button>

  </div>

  <p id="withdrawMsg"></p>

</div>
<footer>
  © 2026 PageVerse — Secure Author Payments
</footer>
<script>
document.getElementById("ifsc").addEventListener("input",e=>{
e.target.value=e.target.value.toUpperCase();
});
</script>
<script src="../js/api.js"></script>
<script src="../js/bank.js"></script>

</body>
</html>
