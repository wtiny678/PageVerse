<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Earnings — PageVerse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins,system-ui;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}
header{
  padding:16px;
  text-align:center;
  background:rgba(255,255,255,0.05);
  font-size:22px;
  font-weight:700;
  color:#38bdf8;
}
.floating-back{
position:fixed;
top:18px;
left:18px;
padding:10px 16px;
border-radius:12px;
background:rgba(56,189,248,.15);
backdrop-filter:blur(10px);
color:#38bdf8;
font-weight:700;
text-decoration:none;
border:1px solid rgba(56,189,248,.5);
z-index:9999;
transition:.3s;
}

.floating-back:hover{
background:#38bdf8;
color:black;
box-shadow:0 0 25px rgba(56,189,248,.9);
}
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
}
.card{
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  padding:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}
.card h3{
  margin-top:0;
  color:#38bdf8;
}
.stat{
  font-size:28px;
  font-weight:700;
}
.sub{
  font-size:13px;
  color:#94a3b8;
}
button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:black;
  font-weight:700;
  cursor:pointer;
}
button:hover{
  background:#0ea5e9;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}
th,td{
  padding:10px;
  text-align:left;
  border-bottom:1px solid rgba(255,255,255,0.1);
  font-size:14px;
}
th{
  color:#cbd5f5;
}
.badge{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
}
.success{background:#16a34a;}
.pending{background:#f59e0b;}
footer{
  text-align:center;
  padding:12px;
  font-size:13px;
  color:#94a3b8;
}
.top-actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}
</style>
</head>

<body>

<header>📊 Earnings Dashboard</header>
<a href="dashboard.html" class="floating-back">⬅ Dashboard</a>
<div class="container">

  <div class="top-actions">
    <h2>Your Earnings</h2>
    <button type="button" onclick="goWithdraw()">Withdraw</button>
  </div>

  <!-- SUMMARY CARDS -->
  <div class="grid">
    <div class="card">
      <h3>Total Balance</h3>
      <div class="stat" id="totalBalance">₹0</div>
      <div class="sub">Available to withdraw</div>
    </div>

    <div class="card">
      <h3>Today</h3>
      <div class="stat" id="todayEarnings">₹0</div>
      <div class="sub">Today's income</div>
    </div>

    <div class="card">
      <h3>This Month</h3>
      <div class="stat" id="monthEarnings">₹0</div>
      <div class="sub">Monthly income</div>
    </div>

    <div class="card">
      <h3>Total Sales</h3>
      <div class="stat" id="totalSales">0</div>
      <div class="sub">Books sold</div>
    </div>
  </div>

  <!-- SALES TABLE -->
  <div class="card" style="margin-top:20px">
    <h3>📚 Sales History</h3>
    <table>
      <thead>
        <tr>
          <th>Book</th>
          <th>Buyer</th>
          <th>Amount</th>
          <th>Date</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="salesTable">
<tr>
<td colspan="5" style="padding:20px;text-align:center;color:#94a3b8">
Loading sales...
</td>
</tr>
</tbody>
    </table>
  </div>

</div>
<nav>
 <center> <a href="dashboard.html"><b>Dashboard</b></a></center>
  
 
</nav>

<footer>
  © 2026 PageVerse — Author Earnings System
</footer>
<script>
window.addEventListener("error",()=>{
const t=document.getElementById("salesTable");
if(t) t.innerHTML='<tr><td colspan="5" style="padding:20px;text-align:center;color:#ef4444">Failed to load data</td></tr>';
});
</script>
<script src="../js/api.js"></script>
<script src="../js/earnings.js"></script>

</body>
</html>
