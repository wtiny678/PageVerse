<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reader | MangaVerse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:Poppins,sans-serif;
  background:radial-gradient(circle at top,#1e293b,#020617);
  color:#e2e8f0;
}
.main{
  display:flex;
  flex-direction:column;
  gap:24px;
}
.comments{
  background:rgba(255,255,255,.05);
  padding:24px;
  border-radius:22px;
}

#commentInput{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  margin-top:10px;
  background:rgba(255,255,255,.08);
  color:white;
}

/* HEADER */

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 40px;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.08);
}

/* PROGRESS BAR */

#progressBar{
  position:fixed;
  top:0;
  left:0;
  height:4px;
  width:0%;
  background:linear-gradient(90deg,#38bdf8,#a78bfa,#22c55e);
  z-index:999;
}

/* LAYOUT */

.container{
  display:grid;
  grid-template-columns:280px 1fr;
  gap:26px;
  padding:30px;
}

/* SIDEBAR */

.sidebar{
  background:rgba(255,255,255,.05);
  border-radius:22px;
  padding:18px;
  transition:.3s;
}

/* HIDE SIDEBAR MODE */

.hide-sidebar .sidebar{
  display:none;
}

.hide-sidebar .container{
  grid-template-columns:1fr;
}

/* CHAPTER */

.chapter{
  padding:12px;
  border-radius:14px;
  margin:8px 0;
  background:rgba(255,255,255,.06);
  transition:.25s;
}

.chapter:hover{
  background:linear-gradient(90deg,#38bdf820,#a78bfa20);
}

/* BOOK INFO */

.book-info{
  display:flex;
  gap:24px;
  padding:24px;
  border-radius:22px;
  background:rgba(255,255,255,.05);
}

.book-info img{
  width:160px;
  border-radius:18px;
}

/* READING PANEL */

#chapterContent{
  background:rgba(255,255,255,.05);
  padding:34px;
  border-radius:24px;
  line-height:1.9;
  font-size:18px;
  min-height:320px;
}

/* BUTTON */

button{
  border:none;
  padding:11px 18px;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  background:linear-gradient(90deg,#38bdf8,#6366f1);
  color:white;
  transition:.25s;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 0 14px #38bdf8;
}

/* FLOATING NAV */

.floatNav{
  position:fixed;
  bottom:30px;
  right:30px;
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:999;
}

.floatNav button{
  width:54px;
  height:54px;
  border-radius:50%;
  font-size:22px;
}

/* FULLSCREEN */

.fullscreen{
  position:fixed;
  inset:0;
  z-index:9999;
  padding:60px;
  overflow:auto;
  background:#020617;
}
/* LOCKED OVERLAY */
.locked-box{
position:relative;
}

.locked-blur{
filter:blur(8px);
pointer-events:none;
user-select:none;
}

.unlock-overlay{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:14px;
background:rgba(2,6,23,.55);
backdrop-filter:blur(6px);
border-radius:16px;
}

.unlock-price{
font-size:22px;
font-weight:800;
color:#38bdf8;
text-shadow:0 0 18px rgba(56,189,248,.9);
}
.book-info img{background:#020617;}
.unlock-btn{
padding:14px 28px;
border:none;
border-radius:30px;
font-weight:800;
cursor:pointer;
background:linear-gradient(90deg,#22c55e,#4ade80);
box-shadow:0 0 25px rgba(34,197,94,.9);
animation:unlockPulse 1.6s infinite;
}

@keyframes unlockPulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

/* EXPLOSION */
.unlock-explode{
animation:unlockBoom .6s ease;
}

@keyframes unlockBoom{
0%{transform:scale(.6);opacity:.4}
60%{transform:scale(1.25);opacity:1}
100%{transform:scale(1);opacity:1}
}

</style>


</head>

<body>
<div id="progressBar"></div>

<header>
  <h2>📖 PageVerse Reader</h2>
  <div id="walletBox">Wallet: ₹<span id="walletBalance">0</span></div>
  <button onclick="window.location.href='dashboard.html'">Back</button>
</header>

<div class="container">

  <div class="sidebar">
    <h3>📚 Chapters</h3>
    <div id="chapterList"></div>
  </div>

  <div class="main">

    <div class="book-info">
     <img id="bookCover"
     src="../assets/book-placeholder.png"
     onerror="this.src='../assets/book-placeholder.png'">

      <div class="book-meta">
        <h2 id="bookTitle"></h2>
        <p id="bookAuthor"></p>
        <p id="bookPrice"></p>
        <button onclick="buyCurrentChapter()">💳 Buy Chapter</button>
        <button onclick="bookmarkBook()">🔖 Bookmark</button>
        <button onclick="buyBook()">🪙 Buy Book</button>
      </div>
    </div>

    <div id="chapterContent">Loading...</div>

    <div class="comments">
      <h3>💬 Comments</h3>
      <div id="commentsList"></div>
      <textarea id="commentInput" placeholder="Write a comment..."></textarea>
      <button onclick="addBookComment()">Post</button>
    </div>

  </div>
</div>
<div class="floatNav">
  <button onclick="prevChapter()">⬅</button>
  <button onclick="nextChapter()">➡</button>
  <button onclick="toggleFullscreen()">⛶</button>
  <button onclick="toggleSidebar()">☰</button>
</div>


<script>
setTimeout(()=>{
const w=document.getElementById("walletBalance");
if(w && w.innerText==="0"){
w.innerText="--";
}
},4000);
</script>
</body>
<!-- JS FILES -->
<script src="../js/api.js"></script>
<script src="../js/reader.js"></script>
</html>
