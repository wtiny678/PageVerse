<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment — PageVerse</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins,system-ui;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}
header{
  padding:16px;
  text-align:center;
  background:rgba(255,255,255,0.05);
  font-size:22px;
  font-weight:700;
  color:#38bdf8;
}
.container{
  max-width:600px;
  margin:auto;
  padding:20px;
}
.card{
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  padding:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
  margin-top:20px;
}
h3{
  margin-top:0;
  color:#38bdf8;
}
.book-info{
  display:flex;
  gap:16px;
  align-items:center;
}
.book-info img{
  width:120px;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}
.price{
  font-size:22px;
  font-weight:700;
  margin-top:8px;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:black;
  font-weight:700;
  cursor:pointer;
  margin-top:16px;
}
button:hover{
  background:#0ea5e9;
}
.status{
  margin-top:14px;
  font-size:14px;
}
.success{color:#22c55e;}
.error{color:#ef4444;}
footer{
  text-align:center;
  padding:12px;
  font-size:13px;
  color:#94a3b8;
}
.floating-back{
position:fixed;
top:18px;
left:18px;
padding:10px 16px;
border-radius:12px;
background:rgba(56,189,248,.15);
backdrop-filter:blur(10px);
color:#38bdf8;
font-weight:700;
text-decoration:none;
border:1px solid rgba(56,189,248,.5);
z-index:9999;
transition:.3s;
}

.floating-back:hover{
background:#38bdf8;
color:black;
box-shadow:0 0 25px rgba(56,189,248,.9);
}
</style>
</head>

<body>

<header>💳 Book Payment</header>
<a href="dashboard.html" class="floating-back">⬅ Dashboard</a>
<div class="container">

  <div class="card">
    <h3>Confirm Purchase</h3>

    <div class="book-info">

  <img 
    id="bookCover"
    src="../assets/book-placeholder.png"
    onerror="this.src='../assets/book-placeholder.png'"
  >

  <div>
    <h4 id="bookTitle">Loading...</h4>
    <p id="bookAuthor">Author: -</p>
    <div class="price" id="bookPrice">₹0</div>
  </div>

</div>

<button id="buyBtn" type="button" onclick="payNow()">
Buy Now
</button>

</div>

<footer>
  © 2026 PageVerse — Secure Payments
</footer>

<script>
document.getElementById("bookCover").style.background="#020617";
</script>
<script src="../js/api.js"></script>
<script src="../js/payments.js"></script>

</body>
</html>
